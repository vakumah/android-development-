<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android Testing Environment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Control Panel</h2>
      </div>

      <div class="section">
        <h3>Device Info</h3>
        <div id="device-info" class="info-grid">
          <div class="info-item">
            <span class="label">Android</span>
            <span id="android-version">-</span>
          </div>
          <div class="info-item">
            <span class="label">Model</span>
            <span id="device-model">-</span>
          </div>
          <div class="info-item">
            <span class="label">Resolution</span>
            <span id="device-resolution">-</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Install Application</h3>
        <div class="install-options">
          <div class="upload-area" id="upload-area">
            <input type="file" id="apk-file" accept=".apk" hidden>
            <label for="apk-file" class="upload-label">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              <span>Drop APK or click to browse</span>
            </label>
          </div>
          <div class="url-install">
            <input type="text" id="apk-url" placeholder="Or paste APK URL">
            <button id="install-url-btn" class="btn btn-primary">Install</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Installed Apps</h3>
        <div class="apps-list" id="apps-list">
          <div class="loading">Loading apps...</div>
        </div>
      </div>

      <div class="section">
        <h3>Quick Actions</h3>
        <div class="actions-grid">
          <button class="btn btn-secondary" id="screenshot-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            Screenshot
          </button>
          <button class="btn btn-secondary" id="home-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            </svg>
            Home
          </button>
          <button class="btn btn-secondary" id="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
          </button>
          <button class="btn btn-secondary" id="recents-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            Recent
          </button>
        </div>
      </div>

      <div class="section">
        <h3>Shell Command</h3>
        <div class="shell-container">
          <input type="text" id="shell-input" placeholder="Enter ADB shell command">
          <button id="shell-btn" class="btn btn-primary">Execute</button>
          <pre id="shell-output"></pre>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="screen-container">
        <canvas id="screen"></canvas>
        <div class="connection-status" id="status">
          <div class="spinner"></div>
          <span>Connecting to device...</span>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
