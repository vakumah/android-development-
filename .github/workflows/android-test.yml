name: Android Testing Environment

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: 'Runtime duration (minutes)'
        required: false
        default: '60'
        type: string

jobs:
  android-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y adb wget

      - name: Setup Binder
        run: |
          echo "Checking kernel modules..."
          ls -la /dev/ | grep binder || echo "No binder devices found"
          
          echo "Trying to create binder devices..."
          sudo mkdir -p /dev/binderfs
          sudo mount -t binder binder /dev/binderfs 2>/dev/null || echo "Cannot mount binderfs"
          
          echo "Creating device nodes..."
          sudo mknod /dev/binder c 10 0 2>/dev/null || echo "Cannot create binder node"
          sudo chmod 666 /dev/binder 2>/dev/null || true

      - name: Start Android Container
        run: |
          docker run -itd --rm --privileged \
            --name redroid \
            -p 5555:5555 \
            -v /dev:/dev \
            redroid/redroid:11.0.0-latest \
            androidboot.use_memfd=true \
            androidboot.redroid_gpu_mode=guest
          
          echo "Waiting for container to initialize..."
          sleep 15
          
          echo "Starting ADB daemon inside container..."
          docker exec redroid sh -c "setprop service.adb.tcp.port 5555 && stop adbd && start adbd" || true
          sleep 5
          
          echo "Checking if ADB port is listening..."
          docker exec redroid netstat -tuln | grep 5555 || echo "Port 5555 not listening yet"
          
          echo "Connecting ADB..."
          for i in {1..30}; do
            adb connect 127.0.0.1:5555 2>&1 | grep -v "already connected" || true
            sleep 2
            
            STATUS=$(adb -s 127.0.0.1:5555 get-state 2>/dev/null || echo "offline")
            
            if [ "$STATUS" == "device" ]; then
              echo "✓ Android is ready!"
              adb -s 127.0.0.1:5555 shell getprop ro.build.version.release
              break
            fi
            
            if [ $((i % 5)) -eq 0 ]; then
              echo "Attempt $i/30 - Status: $STATUS"
              docker exec redroid sh -c "setprop service.adb.tcp.port 5555 && stop adbd && start adbd" 2>/dev/null || true
            fi
            
            if [ $i -eq 30 ]; then
              echo "Failed to boot Android. Diagnostics:"
              echo "=== Container Status ==="
              docker ps -a
              echo "=== Container Logs ==="
              docker logs redroid --tail 100
              echo "=== ADB Devices ==="
              adb devices -l
              exit 1
            fi
          done
          
          echo "Configuring Android settings..."
          adb -s 127.0.0.1:5555 shell "settings put global window_animation_scale 0.5 2>/dev/null || echo 'Skip animation settings'"
          adb -s 127.0.0.1:5555 shell "settings put global transition_animation_scale 0.5 2>/dev/null || echo 'Skip transition settings'"
          adb -s 127.0.0.1:5555 shell "settings put system screen_off_timeout 1800000 2>/dev/null || echo 'Skip timeout settings'"
          echo "✓ Android configured (some settings may be skipped)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Application
        run: npm install

      - name: Start Server & Tunnel
        run: |
          npm start &
          sleep 5
          
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          sleep 5
          
          for i in {1..15}; do
            URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            if [ ! -z "$URL" ]; then
              break
            fi
            sleep 2
          done
          
          echo ""
          echo "=========================================="
          echo "Android Testing Environment"
          echo "=========================================="
          echo "URL: $URL"
          echo "Runtime: ${{ inputs.runtime_minutes }} minutes"
          echo "=========================================="
          echo ""
          
          RUNTIME_SECONDS=$(($${{ inputs.runtime_minutes }} * 60))
          sleep $RUNTIME_SECONDS

      - name: Cleanup
        if: always()
        run: |
          docker stop redroid 2>/dev/null || true
          adb disconnect 127.0.0.1:5555 2>/dev/null || true
