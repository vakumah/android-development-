name: Android Testing Environment

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: 'Runtime duration (minutes)'
        required: false
        default: '60'
        type: string

jobs:
  android-test:
    runs-on: macos-15
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install android-platform-tools scrcpy

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android System Image
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-30;google_apis;arm64-v8a"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "emulator"

      - name: Create AVD
        run: |
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name test_avd \
            --package "system-images;android-30;google_apis;arm64-v8a" \
            --device "pixel_6"

      - name: Start Android Emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-snapshot-save \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim &
          
          echo "Waiting for emulator to boot..."
          adb wait-for-device
          
          timeout=300
          until adb shell getprop sys.boot_completed | grep -q 1; do
            echo "Still booting..."
            sleep 5
            timeout=$((timeout - 5))
            if [ $timeout -le 0 ]; then
              echo "Timeout waiting for boot"
              exit 1
            fi
          done
          
          echo "✓ Android emulator ready!"
          adb devices
          adb shell getprop ro.build.version.release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Application
        run: npm install

      - name: Start Server & Tunnel
        run: |
          echo "Starting web interface..."
          npm start &
          SERVER_PID=$!
          sleep 5
          
          echo "Setting up Cloudflare tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.tgz
          tar -xzf cloudflared-darwin-amd64.tgz
          chmod +x cloudflared
          
          ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          
          sleep 5
          
          URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
          
          echo ""
          echo "=========================================="
          echo "Android Testing Environment"
          echo "=========================================="
          echo "URL: $URL"
          echo "Runtime: ${{ inputs.runtime_minutes }} minutes"
          echo ""
          echo "Features:"
          echo "• Real-time screen streaming"
          echo "• APK installation"
          echo "• Touch control"
          echo "• Shell commands"
          echo "=========================================="
          echo ""
          
          RUNTIME_SECONDS=$((${{ inputs.runtime_minutes }} * 60))
          echo "Holding environment for ${{ inputs.runtime_minutes }} minutes..."
          echo "Press Cancel Workflow button to stop early"
          
          sleep $RUNTIME_SECONDS
          
          echo "Runtime expired, cleaning up..."
          kill $SERVER_PID $TUNNEL_PID 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          adb emu kill 2>/dev/null || true
          pkill -f emulator 2>/dev/null || true
