name: Android Testing Environment

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: 'Runtime duration (minutes)'
        required: false
        default: '60'
        type: string

jobs:
  android-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y adb wget

      - name: Start Android with noVNC
        run: |
          docker run -d --rm --privileged \
            --name android \
            -p 6080:6080 \
            -p 5555:5555 \
            -e EMULATOR_DEVICE="Samsung Galaxy S10" \
            -e WEB_VNC=true \
            budtmo/docker-android:emulator_11.0
          
          echo "Waiting for Android to boot..."
          sleep 30
          
          for i in {1..20}; do
            adb connect 127.0.0.1:5555 2>&1 | grep -v "already connected" || true
            sleep 3
            
            STATUS=$(adb -s 127.0.0.1:5555 get-state 2>/dev/null || echo "offline")
            
            if [ "$STATUS" == "device" ]; then
              echo "✓ Android is ready!"
              adb -s 127.0.0.1:5555 shell getprop ro.build.version.release
              break
            fi
            
            if [ $i -eq 20 ]; then
              echo "Timeout. Container logs:"
              docker logs android --tail 50
              exit 1
            fi
            
            echo "Attempt $i/20 - Status: $STATUS"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Application
        run: npm install

      - name: Start Server & Tunnel
        run: |
          echo "Starting custom web interface..."
          npm start &
          SERVER_PID=$!
          sleep 5
          
          echo "Setting up Cloudflare tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          
          ./cloudflared tunnel --url http://localhost:8000 > tunnel1.log 2>&1 &
          TUNNEL1_PID=$!
          
          ./cloudflared tunnel --url http://localhost:6080 > tunnel2.log 2>&1 &
          TUNNEL2_PID=$!
          
          sleep 5
          
          URL1=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel1.log | head -n 1)
          URL2=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel2.log | head -n 1)
          
          echo ""
          echo "=========================================="
          echo "Android Testing Environment"
          echo "=========================================="
          echo "Custom Interface: $URL1"
          echo "noVNC Interface: $URL2"
          echo "Runtime: ${{ inputs.runtime_minutes }} minutes"
          echo "=========================================="
          echo ""
          
          RUNTIME_SECONDS=$((${{ inputs.runtime_minutes }} * 60))
          echo "Holding environment for ${{ inputs.runtime_minutes }} minutes..."
          echo "Press Cancel Workflow button to stop early"
          
          sleep $RUNTIME_SECONDS
          
          echo "Runtime expired, cleaning up..."
          kill $SERVER_PID $TUNNEL1_PID $TUNNEL2_PID 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker stop android 2>/dev/null || true
          adb disconnect 127.0.0.1:5555 2>/dev/null || true
