name: Android Testing Environment

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: 'Runtime duration (minutes)'
        required: false
        default: '60'
        type: string

jobs:
  android-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y adb wget

      - name: Start Android Container
        run: |
          docker run -itd --rm --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:11.0.0-latest \
            androidboot.use_memfd=true \
            androidboot.redroid_gpu_mode=guest
          
          echo "Waiting for Android to boot..."
          sleep 20
          
          for i in {1..25}; do
            adb connect 127.0.0.1:5555 2>&1 | grep -v "already connected" || true
            sleep 3
            
            STATUS=$(adb -s 127.0.0.1:5555 get-state 2>/dev/null || echo "offline")
            
            if [ "$STATUS" == "device" ]; then
              echo "✓ Android is ready!"
              adb -s 127.0.0.1:5555 shell getprop ro.build.version.release
              break
            fi
            
            if [ $i -eq 25 ]; then
              echo "Timeout. Container logs:"
              docker logs redroid --tail 50
              exit 1
            fi
            
            echo "Attempt $i/25 - Status: $STATUS"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Application
        run: npm install

      - name: Start Server & Tunnel
        run: |
          echo "Starting web interface..."
          npm start &
          SERVER_PID=$!
          sleep 5
          
          echo "Setting up Cloudflare tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          
          ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          
          sleep 5
          
          URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
          
          echo ""
          echo "=========================================="
          echo "Android Testing Environment"
          echo "=========================================="
          echo "URL: $URL"
          echo "Runtime: ${{ inputs.runtime_minutes }} minutes"
          echo ""
          echo "Note: Screen streaming disabled due to"
          echo "binder limitations. Use APK install and"
          echo "shell commands for testing."
          echo "=========================================="
          echo ""
          
          RUNTIME_SECONDS=$((${{ inputs.runtime_minutes }} * 60))
          echo "Holding environment for ${{ inputs.runtime_minutes }} minutes..."
          echo "Press Cancel Workflow button to stop early"
          
          sleep $RUNTIME_SECONDS
          
          echo "Runtime expired, cleaning up..."
          kill $SERVER_PID $TUNNEL_PID 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker stop redroid 2>/dev/null || true
          adb disconnect 127.0.0.1:5555 2>/dev/null || true
