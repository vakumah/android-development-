name: Android ARM64 Emulator

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL APK yang mau diinstall (opsional)'
        required: false
        type: string

jobs:
  emulator:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Run Android Emulator ARM64 + Web Viewer
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: arm64-v8a
          profile: pixel_6
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -no-snapshot -accel tcg -no-metrics
          script: |
            adb wait-for-device

            echo "Menunggu boot selesai..."
            timeout=300
            while [ $timeout -gt 0 ] && [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != "1" ]; do
              sleep 8
              timeout=$((timeout-8))
            done

            if [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; then
              echo "Emulator berhasil boot"
            else
              echo "Boot timeout, lanjut saja"
            fi

            if [ -n "${{ inputs.apk_url }}" ]; then
              curl -L -o /tmp/app.apk "${{ inputs.apk_url }}"
              adb install -r /tmp/app.apk
            fi

            git clone https://github.com/NetrisTV/ws-scrcpy.git /tmp/ws-scrcpy --depth 1
            cd /tmp/ws-scrcpy
            npm install
            npm start &

            brew install cloudflared
            cloudflared tunnel --url http://localhost:8080 --no-autoupdate &

            sleep 21600
