name: Android ARM64 Emulator

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL APK yang mau diinstall (opsional)'
        required: false
        type: string

jobs:
  emulator:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Start emulator dan web viewer
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: |
            if [ -n "${{ inputs.apk_url }}" ]; then
              curl -L -o /tmp/app.apk "${{ inputs.apk_url }}"
              adb install -r /tmp/app.apk
            fi

            git clone https://github.com/NetrisTV/ws-scrcpy.git /tmp/ws-scrcpy
            cd /tmp/ws-scrcpy
            npm install
            npm start &

            brew install cloudflared
            cloudflared tunnel --url http://localhost:8080 &

            sleep 21600
